# Define agent tasks configuration
tarefa_extracao:
  description: >
    A partir do conteúdo textual do CNIS abaixo, extraia de forma estruturada o Nome,
    CPF, Nome da Mãe e a lista completa de vínculos (Empresa, Data de Início, Data de Fim).

    Conteúdo do CNIS:
    ---
    {conteudo_cnis}
    ---
  expected_output: >
    Um dicionário estruturado contendo os dados do cabeçalho e a lista de vínculos empregatícios.
  agent: especialista_extracao

tarefa_validacao_identidade:
  description: >
    Verificar se o CPF extraído está regular e se os dados de filiação batem com os registros.
    Sinalizar erros cadastrais básicos.
  expected_output: >
    Status de regularidade do CPF e validação dos dados de identificação.
  agent: auditor_identidade

tarefa_auditoria_erros:
  description: >
    Analisar a lista de vínculos em busca de: 1. Períodos sem data de demissão;
    2. Vínculos duplicados na mesma data; 3. Datas de fim anteriores ao início.
  expected_output: >
    Uma lista detalhada de inconsistências lógicas encontradas no histórico contributivo.
  agent: auditor_previdenciario

tarefa_geracao_relatorio:
  description: >
    Consolidar todos os achados das tarefas anteriores em um relatório final estruturado e auto-contido.

    Preencha os seguintes campos obrigatoriamente:
    - 'titulo': um título descritivo que resuma os achados principais (ex: "Análise do CNIS - X Inconsistências Detectadas")
    - 'descricaoGeral': resumo dos achados (ex: "Foi identificada(s) X inconsistência(s) no histórico previdenciário")
    - 'dados_extraidos': objeto contendo os dados básicos extraídos:
      * 'nome': nome completo do segurado
      * 'cpf': CPF do segurado (formato ou bruto)
      * 'nome_mae': nome da mãe
      * 'total_vinculos': número total de vínculos encontrados
      * 'periodo_inicial': data do vínculo mais antigo (YYYY-MM-DD)
      * 'periodo_final': data do vínculo mais recente (YYYY-MM-DD)
    - 'failures': array com cada falha/inconsistência encontrada, contendo:
      * 'titulo': nome breve da falha
      * 'severidade': um dos valores [ALTA, MEDIA, BAIXA, INFO]
      * 'descricao': descrição técnica do problema
      * 'sugestaoCorrecao': recomendação de como resolver
      * 'confianca': valor entre 0 e 1 representando o nível de certeza
    - 'relatorio_sumario_juridico': análise técnica em linguagem jurídica para advogado
    - 'sumario': linguagem clara e acessível para o cidadão comum
  expected_output: >
    Um objeto AnalysisResult auto-contido contendo: titulo, descricaoGeral, dados_extraidos, failures (array estruturado), relatorio_sumario_juridico e sumario.
  agent: gerador_relatorio

# Define agent tasks configuration
tarefa_extracao:
  description: >
    A partir do conteúdo textual do CNIS abaixo, extraia de forma estruturada o Nome,
    CPF, Nome da Mãe e a lista completa de vínculos (Empresa, Data de Início, Data de Fim).

    Conteúdo do CNIS:
    ---
    {conteudo_cnis}
    ---
  expected_output: >
    Um dicionário estruturado contendo os dados do cabeçalho e a lista de vínculos empregatícios.
  agent: especialista_extracao

tarefa_validacao_identidade:
  description: >
    Verificar se o CPF extraído está regular e se os dados de filiação batem com os registros.
    Sinalizar erros cadastrais básicos.
  expected_output: >
    Status de regularidade do CPF e validação dos dados de identificação.
  agent: auditor_identidade

tarefa_auditoria_erros:
  description: >
    Analisar a lista de vínculos em busca de: 1. Períodos sem data de demissão;
    2. Vínculos duplicados na mesma data; 3. Datas de fim anteriores ao início.
  expected_output: >
    Uma lista detalhada de inconsistências lógicas encontradas no histórico contributivo.
  agent: auditor_previdenciario

tarefa_geracao_relatorio:
  description: >
    Consolidar todos os achados das tarefas anteriores em um relatório final estruturado conforme o schema definido.

    Preencha:
    - 'validacoes': status do CPF, validade dos dados de identidade e mensagens explicativas.
    - 'inconsistencias': cada erro detectado no histórico previdenciário com uma 'confianca' entre 0 e 1.
    - 'relatorio.sumario_juridico': linguagem técnica para advogado.
    - 'relatorio.sumario_comum': linguagem clara para o cidadão.
  expected_output: >
    Um objeto AnalysisResult contendo validacoes, inconsistencias e relatorio.
  agent: gerador_relatorio
